# 서버 포트 설정
server:
  port: 8082

# database 연동 설정
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_codingrecipe?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password:
  thymeleaf:
    cache: false

  # spring data jpa 설정
  jpa:
#    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect # 옛날 버전 > Hibernate 5.4.1 버전부터는 MySQL 8에 대한 Dialect를 자동으로 감지해서 database-platform을 작성하지 않아됨
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update # creat 로 되어있으면 기존 만들어 둔 DB가 사라지면서 생성됨.